<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis | Smart Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app-container">
    <!-- AUTHENTICATION ZONE -->
    <div class="auth-layer" id="authLayer">
        <div class="glass-panel main-scanner">
           <div class="top-indicator">
               <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                   <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
               </svg>
               <span>SECURED STATE</span>
           </div>

           <div class="camera-wrapper" id="cameraWrapper">
               <video id="webcam" autoplay playsinline></video>
               <div class="scan-bar"></div>
           </div>
           
           <div class="controls">
               <h2>Aegis Entryway</h2>
               <p id="systemMessage">Awaiting Biometric Validation.</p>
               <div class="btn-group">
                   <button class="lux-btn" id="btnRegister">Set Master Face</button>
                   <button class="lux-btn primary" id="btnScan">Unlock Home</button>
               </div>
           </div>
        </div>
    </div>
    <canvas id="canvas" style="display: none;"></canvas>

    <!-- THE HOUSE / VAULT INTERIOR -->
    <div class="home-layer" id="homeLayer">
        <div class="glass-panel dashboard">
             <div class="header">
                 <div class="welcome-msg">
                     <h2>Welcome Back</h2>
                     <p>Aegis Security System is currently Disarmed.</p>
                 </div>
                 <button class="lux-btn" id="btnLock">
                     <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                         <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                         <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                     </svg>
                     Lock & Secure
                 </button>
             </div>
             <div class="smart-controls">
                 <div class="control-card active">
                     <div class="card-icon">🏠</div>
                     <h3>Secret Vault</h3>
                     <p>Status: DOORS OPEN</p>
                 </div>
                 <div class="control-card">
                     <div class="card-icon">🌡️</div>
                     <h3>Climate Control</h3>
                     <p>Status: 72°F</p>
                 </div>
                 <div class="control-card">
                     <div class="card-icon">💡</div>
                     <h3>Lighting</h3>
                     <p>Status: Muted Elegance</p>
                 </div>
             </div>
             
             <!-- Audit Log inline for the premium feel -->
            <div class="audit-log">
                <h3>Recent Activity</h3>
                <div class="log-container" id="logList">
                    <!-- Logs populated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
